name: Daily Stock Screener - Google Sheets Update

on:
  schedule:
    - cron: "0 15 * * *"
  workflow_dispatch:
    inputs:
      run_mode:
        description: "full = all screeners; etf-only = Indian ETF screener only"
        required: true
        default: full
        type: choice
        options:
          - full
          - etf-only

jobs:
  screener:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools
          pip install -r requirements-google-sheets.txt
          pip install -r indian-etf-analyzer-python/requirements.txt
          pip install -r indian-nifty100-analyzer-python/requirements.txt

      - name: Verify Google Sheets dependencies
        run: |
          python -c "from google.oauth2.service_account import Credentials; import gspread; print('google sheets deps ok')"

      - name: Run Indian ETF Analyzer
        if: ${{ contains(fromJSON('["full","etf-only"]'), github.event.inputs.run_mode || 'full') }}
        run: python indian-etf-analyzer-python/analyze_etfs.py
        continue-on-error: true

      - name: Run Nifty 100 Turtle + DM
        if: ${{ (github.event.inputs.run_mode || 'full') == 'full' }}
        run: python indian-nifty100-analyzer-python/analyze_stocks.py
        continue-on-error: true

      - name: Run Nifty 200 Piotroski
        if: ${{ (github.event.inputs.run_mode || 'full') == 'full' }}
        run: python indian-nifty200-piotroski/analyze_piotroski.py
        continue-on-error: true

      - name: Run MidSmall EGA Screener
        if: ${{ (github.event.inputs.run_mode || 'full') == 'full' }}
        run: python indian-midsmall-ega-screener/analyze_stocks.py
        continue-on-error: true

      - name: Run Midcap PEAD Screener
        if: ${{ (github.event.inputs.run_mode || 'full') == 'full' }}
        run: python indian-midcap-pead-screener/analyze_pead.py
        continue-on-error: true

      - name: Upload to Google Sheets
        env:
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: python google_sheets_uploader.py

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screener-outputs
          path: |
            indian-etf-analyzer-python/output/*.csv
            indian-nifty100-analyzer-python/output/*.csv
            indian-nifty200-piotroski/output/*.csv
            indian-midsmall-ega-screener/output/*.csv
            indian-midcap-pead-screener/output/*.csv
          retention-days: 7
